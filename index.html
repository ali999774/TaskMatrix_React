<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>TaskMatrix</title>
    <style>
      /* Base focus ring — floor §5 */
      :focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px rgb(96 165 250 / 0.6);
        border-radius: 4px;
      }
      /* Dark mode focus ring */
      .dark :focus-visible {
        box-shadow: 0 0 0 2px rgb(96 165 250 / 0.5);
      }
      /* Base active state — floor §5. Opacity only; scale left to component classes. */
      button:active {
        opacity: 0.8;
      }
    </style>
    <script>
      // Force clear stale cache on app update.
      // NOTE: localStorage.clear() also wipes the Supabase session — every
      // APP_VERSION bump signs everyone out. Bump deliberately.
      var APP_VERSION = '3';
      if (localStorage.getItem('tm-version') !== APP_VERSION) {
        localStorage.clear();
        // Also nuke IndexedDB (stale Supabase sessions)
        if (window.indexedDB) {
          try { window.indexedDB.deleteDatabase('taskmatrix_offline_'); } catch(e) {}
        }
        localStorage.setItem('tm-version', APP_VERSION);
      }
      // Prevent flash of wrong theme
      (function() {
        var t = localStorage.getItem('tm-theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
