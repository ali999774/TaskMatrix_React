    <style>
      html, body {
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
      }
      /* Base focus ring — floor §5 */
      :focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px rgb(96 165 250 / 0.6);
        border-radius: 4px;
      }
      /* Dark mode focus ring */
      .dark :focus-visible {
        box-shadow: 0 0 0 2px rgb(96 165 250 / 0.5);
      }
      /* Base active state — floor §5. Opacity only; scale left to component classes. */
      button:active {
        opacity: 0.8;
      }
    </style>
    <script>
      // Prevent flash of wrong theme
      (function() {
        var t = localStorage.getItem('tm-theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
        // Prevent flash of wrong text size — apply saved font scale before paint.
        var fs = parseFloat(localStorage.getItem('tm-font-scale'));
        if (fs && fs > 0 && fs !== 1) {
          document.documentElement.style.fontSize = (16 * fs) + 'px';
        }
      })();
    </script>
